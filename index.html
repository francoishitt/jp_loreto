        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        function pop_dashboard_jp_fp_posiciones_4(feature, layer) {
    var p = feature.properties || {};

    function val(keys, def) {
        for (var i = 0; i < keys.length; i++) {
            var k = keys[i];
            if (p[k] !== undefined && p[k] !== null && p[k] !== '') return p[k];
        }
        return def;
    }

    function num(keys, def) {
        var x = val(keys, def === undefined ? 0 : def);
        if (x === true) return 1;
        if (x === false) return 0;
        var n = Number(String(x).replace(',', '.'));
        return isNaN(n) ? (def === undefined ? 0 : def) : n;
    }

    function fmt(n) {
        n = Number(n);
        if (isNaN(n)) return '0';
        return Math.round(n).toLocaleString('es-PE');
    }

    function pct(n) {
        n = Number(n);
        if (isNaN(n)) return '0.00';
        return n.toFixed(2);
    }

    function esc(x) {
        x = (x === undefined || x === null) ? '' : String(x);
        x = x
            .replace(/Ã‘/g, 'Ñ')
            .replace(/Ã±/g, 'ñ')
            .replace(/Ã¡/g, 'á')
            .replace(/Ã©/g, 'é')
            .replace(/Ãí/g, 'í')
            .replace(/Ã­/g, 'í')
            .replace(/Ã³/g, 'ó')
            .replace(/Ãº/g, 'ú')
            .replace(/Ã/g, 'í')
            .replace(/SEíORA/g, 'SEÑORA')
            .replace(/SEÃORA/g, 'SEÑORA')
            .replace(/NIíOS/g, 'NIÑOS')
            .replace(/NIÃOS/g, 'NIÑOS')
            .replace(/PERí/g, 'PERÚ')
            .replace(/PERÃ/g, 'PERÚ');
        return x
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function estadoJPP(x) {
        if (x === 'JPP_GANA') return 'Gana el local';
        if (x === 'JPP_SEGUNDO') return 'Segundo lugar';
        if (x === 'JPP_TERCERO') return 'Tercer lugar';
        if (x === 'JPP_OTRO_PUESTO') return 'Otro puesto';
        return x || '';
    }

    var electores = num(['total_electores_habiles']);
    var emitidos = num(['total_votos_emitidos']);
    var validos = num(['total_votos_validos']);
    var ausentes = num(['ausentes'], electores - emitidos);
    var pctAus = num(['pct_ausent'], electores ? (ausentes * 100 / electores) : 0);
    var pctPart = num(['pct_partic'], electores ? (emitidos * 100 / electores) : 0);

    var imp = num(['votos_impugnados', 'dash_votos_impugnados']);
    var jpp = num(['jpp_votos']);
    var fp = num(['fp_votos']);
    var otros = num(['otros_partidos_votos']);
    var blanco = num(['dash_votos_blanco']);
    var nulos = num(['dash_votos_nulos']);

    var controlEmitidos = (emitidos === (validos + blanco + nulos + imp));
    var controlValidos = (validos === (jpp + fp + otros));
    var control = (controlEmitidos && controlValidos) ? 'OK' : 'REVISAR';

    <div style="font-family:Arial, sans-serif; font-size:13px; width:330px; line-height:1.25;">
      <h3 style="margin:0 0 8px 0; font-size:16px;">${esc(val(['nombreLocalVotacion'], ''))}</h3>

      <b>Resultado JPP:</b> ${esc(estadoJPP(val(['estado_jpp_local'], '')))}<br>
      <b>Control ONPE:</b> ${control}<br><br>

      <b>Electores hábiles:</b> ${fmt(electores)}<br>
      <b>Total votos emitidos:</b> ${fmt(emitidos)}<br>
      <b>Total votos válidos:</b> ${fmt(validos)}<br>
      <b>Ausentes:</b> ${fmt(ausentes)}<br>
      <b>Ausentismo:</b> ${pct(pctAus)} %<br>
      <b>Participación:</b> ${pct(pctPart)} %<br><br>

      <table cellpadding="4" cellspacing="0" style="border-collapse:collapse; width:100%; font-size:13px;">
        <tr style="background:#f0f0f0;">
          <th style="border:1px solid #999;">Grupo</th>
          <th style="border:1px solid #999;">Votos</th>
          <th style="border:1px solid #999;">Puesto</th>
        </tr>
        <tr>
          <td style="border:1px solid #999;">Juntos por el Perú</td>
          <td style="border:1px solid #999; text-align:right;">${fmt(jpp)}</td>
          <td style="border:1px solid #999; text-align:center;">${esc(val(['jpp_puesto'], ''))}°</td>
        </tr>
        <tr>
          <td style="border:1px solid #999;">Fuerza Popular</td>
          <td style="border:1px solid #999; text-align:right;">${fmt(fp)}</td>
          <td style="border:1px solid #999; text-align:center;">${esc(val(['fp_puesto'], ''))}°</td>
        </tr>
        <tr>
          <td style="border:1px solid #999;">Otros partidos</td>
          <td style="border:1px solid #999; text-align:right;">${fmt(otros)}</td>
          <td style="border:1px solid #999; text-align:center;">-</td>
        </tr>
        <tr>

          <td style="border:1px solid #999; text-align:right;">${fmt(blanco)}</td>
          <td style="border:1px solid #999; text-align:center;">-</td>
        </tr>
        <tr>
          <td style="border:1px solid #999;">Votos nulos</td>
          <td style="border:1px solid #999; text-align:right;">${fmt(nulos)}</td>
          <td style="border:1px solid #999; text-align:center;">-</td>
        </tr>
        <tr>
          <td style="border:1px solid #999;">Votos impugnados</td>
          <td style="border:1px solid #999; text-align:right;">${fmt(imp)}</td>
          <td style="border:1px solid #999; text-align:center;">-</td>
        </tr>
      </table>

      <br>
      <b>Ganador político:</b> ${esc(val(['top1_partido'], ''))}<br>
      <b>Votos ganador:</b> ${fmt(num(['top1_votos']))}
    </div>
    `;

    layer.bindPopup(popupContent, {maxHeight: 480, maxWidth: 380});
}

        function radioPorVotos(feature) {
    var p = feature.properties || {};
    var v = Number(p['total_votos_emitidos']) || 0;
    return Math.max(4, Math.min(18, 4 + (Math.sqrt(v) / Math.sqrt(7000)) * 14));
}

function style_dashboard_jp_fp_posiciones_4_0(feature) {
    var estado = String((feature.properties || {})['estado_jpp_local']);
    var fillColor = 'rgba(133,221,183,1.0)';

    if (estado === 'JPP_GANA') {
        fillColor = 'rgba(31,174,9,1.0)';
    } else if (estado === 'JPP_SEGUNDO') {
        fillColor = 'rgba(64,94,203,1.0)';
    } else if (estado === 'JPP_TERCERO') {
        fillColor = 'rgba(214,32,220,1.0)';
    } else if (estado === 'JPP_OTRO_PUESTO') {
        fillColor = 'rgba(243,69,69,1.0)';
    }

    return {
        pane: 'pane_dashboard_jp_fp_posiciones_4',
        radius: radioPorVotos(feature),
        opacity: 1,
        color: 'rgba(35,35,35,1.0)',
        dashArray: '',
        lineCap: 'butt',
        lineJoin: 'miter',
        weight: 1,
        fill: true,
        fillOpacity: 0.85,
        fillColor: fillColor,
        interactive: true
    };
}
